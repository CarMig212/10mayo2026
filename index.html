<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Día de las Madres!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 350px;
            transition: all 0.5s ease;
        }
        h1 {
            color: #d81b60;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #555;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        button {
            background-color: #d81b60;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }
        button:hover {
            background-color: #c2185b;
            transform: scale(1.05);
        }
        .btn-volver {
            background-color: #f48fb1;
            margin-top: 15px;
            padding: 8px 20px;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(244, 143, 177, 0.4);
        }
        .btn-volver:hover {
            background-color: #f06292;
        }
        #sorpresa {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #inicio {
            transition: opacity 0.5s ease;
        }
        .foto-mama {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid #ff9a9e;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .firma {
            font-weight: bold;
            color: #d81b60;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container" id="tarjeta">
        <!-- Contenedor de la pantalla inicial -->
        <div id="inicio">
            <h1>¡Hola, mamá! ❤️</h1>
            <p>Tengo un pequeño detalle para ti hoy</p>
            <button onclick="revelarSorpresa()">Toca aquí para abrirlo</button>
        </div>
        
        <!-- Contenedor de la sorpresa -->
        <div id="sorpresa">
            <img src="foto.jpg" alt="Mi mamá y yo" class="foto-mama">
            
            <h1>¡Feliz Día de las Madres, mami!</h1>
            <p>Gracias por ser la mejor mamá, por cuidarnos siempre y por todo tu apoyo incondicional. Gracias por estar ahí y consentirme aun cuando no siempre lo merezco. Te quiero y amo muchísimo.</p>
            <p class="firma">Con cariño,<br>Carlos Miguel</p>

            <button class="btn-volver" onclick="ocultarSorpresa()">Volver al inicio</button>
        </div>
    </div>

    <script>
        function revelarSorpresa() {
            const inicio = document.getElementById('inicio');
            const sorpresa = document.getElementById('sorpresa');

            // Desvanecer la pantalla de inicio
            inicio.style.opacity = '0';
            
            setTimeout(() => {
                inicio.style.display = 'none';
                sorpresa.style.display = 'block';
                
                // Delay para que la transición de opacidad se vea suave
                setTimeout(() => {
                    sorpresa.style.opacity = '1';
                }, 50);
            }, 500); 
        }

        function ocultarSorpresa() {
            const inicio = document.getElementById('inicio');
            const sorpresa = document.getElementById('sorpresa');

            // Desvanecer la pantalla de sorpresa
            sorpresa.style.opacity = '0';
            
            setTimeout(() => {
                sorpresa.style.display = 'none';
                inicio.style.display = 'block';
                
                // Mostrar de nuevo la pantalla de inicio
                setTimeout(() => {
                    inicio.style.opacity = '1';
                }, 50);
            }, 500);
        }
    </script>

</body>
</html>
